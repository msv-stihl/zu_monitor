name: Update incident data

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-incident-data
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build docs data
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
          API_URL: ${{ secrets.API_URL }}
          API_COOKIE: ${{ secrets.API_COOKIE }}
          PRISMA_REQUEST_VERIFICATION_TOKEN: ${{ secrets.PRISMA_REQUEST_VERIFICATION_TOKEN }}
          PRISMA_SIGNALR_ID_CONNECTION: ${{ secrets.PRISMA_SIGNALR_ID_CONNECTION }}
          API_HEADERS_JSON: ${{ secrets.API_HEADERS_JSON }}
          API_PAYLOAD: ${{ secrets.API_PAYLOAD }}
        run: |
          python scripts/build_data.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/*.json
          git commit -m "chore(data): refresh incidents"
          git push
